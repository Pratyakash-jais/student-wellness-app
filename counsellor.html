<!DOCTYPE html>
<html>
<head>
  <title>Counsellor Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h2>📋 Counsellor Dashboard</h2>
  <div id="data"></div>
</div>

<script>
fetch("https://your-app-name.onrender.com/getData")
.then(res => res.json())
.then(data => {
  let output = "";

  data.forEach((d, index) => {
    output += `
      <div style="background:#ffffff20; padding:15px; margin:10px; border-radius:10px;">
        <p><b>Student ${index + 1}</b></p>
        <p><b>Mood:</b> ${d.mood}</p>
        <p><b>Problem:</b> ${d.problem}</p>
      <button onclick="openReply()">Reply</button>
      </div>
    `;
  });

  document.getElementById("data").innerHTML = output;
});
function openReply() {
  window.location.href = "reply.html";
}
function reply() {
  alert("Reply feature coming soon!");
}
</script>

</body>
</html>
